# Nginx 配置 for www.growingysa.com
# 将此文件复制到 /etc/nginx/sites-available/ 并创建软链接

server {
    listen 80;
    server_name www.growingysa.com growingysa.com;

    # 日志路径
    access_log /var/log/nginx/growingysa.access.log;
    error_log /var/log/nginx/growingysa.error.log;

    # 静态文件目录
    root /var/www/timeline/dist;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 缓存静态资源
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 图片上传目录
    location /uploads/ {
        alias /var/www/timeline/public/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # API 请求转发到 Node.js 后端
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 前端路由 - 所有路由都指向 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问敏感文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(README\.md|package\.json|server\.js|server-mysql\.js|\.env) {
        deny all;
        access_log off;
        log_not_found off;
    }
}

